<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gRPC リアルタイム株価ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }

    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge-live    { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
    .badge-stopped { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }

    .subtitle {
      font-size: 0.8rem;
      color: #64748b;
      margin-left: auto;
    }

    .main-container {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .grid-container {
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .comment-panel {
      width: 320px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .comment-header {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #f1f5f9;
    }

    .comment-list {
      flex: 1;
      overflow-y: auto;
      max-height: 400px;
      margin-bottom: 16px;
    }

    .comment-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }

    .comment-item.my-comment {
      background: #1e3a5f;
      border-color: #3b82f6;
    }

    .comment-time { color: #64748b; font-size: 0.75rem; }
    .comment-user { color: #22c55e; font-weight: 600; }
    .comment-symbol { color: #f59e0b; font-weight: 500; }
    .comment-text { color: #e2e8f0; margin-top: 2px; }

    .comment-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .symbol-select {
      padding: 8px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
    }

    .comment-input-group {
      display: flex;
      gap: 8px;
    }

    .comment-input {
      flex: 1;
      padding: 8px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
    }

    .comment-send {
      padding: 8px 16px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .comment-send:hover { background: #16a34a; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.3s;
    }
    .card.up   { border-color: #22c55e44; }
    .card.down { border-color: #ef444444; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .symbol { font-size: 1.2rem; font-weight: 700; color: #f1f5f9; }
    .time   { font-size: 0.72rem; color: #64748b; }

    .price {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .change {
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      gap: 8px;
    }
    .up   .price,  .up   .change { color: #22c55e; }
    .down .price,  .down .change { color: #ef4444; }
    .neutral .price, .neutral .change { color: #94a3b8; }

    .arrow { font-size: 1rem; }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    #btnStart { background: #22c55e; color: #fff; }
    #btnStop  { background: #ef4444; color: #fff; }

    .log {
      margin-top: 24px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      font-size: 0.78rem;
      color: #64748b;
      max-height: 140px;
      overflow-y: auto;
    }
    .log p { margin-bottom: 4px; }
    .log .info  { color: #38bdf8; }
    .log .error { color: #f87171; }
  </style>
</head>
<body>

<header>
  <h1>📈 リアルタイム株価ダッシュボード</h1>
  <span id="statusBadge" class="badge badge-stopped">● STOPPED</span>
  <span class="subtitle">powered by gRPC Server Streaming</span>
</header>

<div class="controls">
  <button id="btnStart">▶ 配信開始</button>
  <button id="btnStop">■ 停止</button>
</div>

<div class="main-container">
  <div class="grid-container">
    <div class="grid" id="grid">
      <!-- カードはJavaScriptで動的に生成 -->
    </div>
  </div>

  <div class="comment-panel">
    <div class="comment-header">💬 ライブコメント</div>
    
    <div class="comment-list" id="commentList">
      <!-- コメントはJavaScriptで動的に生成 -->
    </div>

    <div class="comment-controls">
      <select id="symbolSelect" class="symbol-select">
        <option value="">全体</option>
        <option value="AAPL">AAPL</option>
        <option value="GOOGL">GOOGL</option>
        <option value="MSFT">MSFT</option>
        <option value="AMZN">AMZN</option>
        <option value="TSLA">TSLA</option>
        <option value="META">META</option>
      </select>
      
      <div class="comment-input-group">
        <input id="commentInput" class="comment-input" type="text" placeholder="コメントを入力..." maxlength="100">
        <button id="commentSend" class="comment-send">送信</button>
      </div>
    </div>
  </div>
</div>

<div class="log" id="log">
  <p class="info">配信開始ボタンを押してください。</p>
</div>

<script>
  const SYMBOLS = ['AAPL', 'GOOGL', 'MSFT', 'AMZN', 'TSLA', 'META'];
  let eventSource = null;
  
  // コメント機能用変数
  const myUserName = 'User-' + Math.random().toString(36).substr(2, 4).toUpperCase();
  let ws = null;

  const grid        = document.getElementById('grid');
  const logEl       = document.getElementById('log');
  const statusBadge = document.getElementById('statusBadge');

  // カードの初期化
  SYMBOLS.forEach(sym => {
    const card = document.createElement('div');
    card.className = 'card neutral';
    card.id = `card-${sym}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="symbol">${sym}</span>
        <span class="time" id="time-${sym}">--:--:--</span>
      </div>
      <div class="price" id="price-${sym}">---.--</div>
      <div class="change">
        <span class="arrow" id="arrow-${sym}">→</span>
        <span id="change-${sym}">0.00</span>
        <span id="pct-${sym}">(0.00%)</span>
      </div>
    `;
    grid.appendChild(card);
  });

  function addLog(msg, type = '') {
    const p = document.createElement('p');
    p.className = type;
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.prepend(p);
    // 最大20件
    while (logEl.children.length > 20) logEl.removeChild(logEl.lastChild);
  }

  function updateCard(data) {
    const card    = document.getElementById(`card-${data.symbol}`);
    const priceEl = document.getElementById(`price-${data.symbol}`);
    const changeEl= document.getElementById(`change-${data.symbol}`);
    const pctEl   = document.getElementById(`pct-${data.symbol}`);
    const arrowEl = document.getElementById(`arrow-${data.symbol}`);
    const timeEl  = document.getElementById(`time-${data.symbol}`);
    if (!card) return;

    const up = data.change > 0;
    const dn = data.change < 0;

    card.className    = `card ${up ? 'up' : dn ? 'down' : 'neutral'}`;
    priceEl.textContent  = `$${data.price.toFixed(2)}`;
    changeEl.textContent = `${up ? '+' : ''}${data.change.toFixed(2)}`;
    pctEl.textContent    = `(${up ? '+' : ''}${data.changePct.toFixed(2)}%)`;
    arrowEl.textContent  = up ? '▲' : dn ? '▼' : '→';
    timeEl.textContent   = data.updatedAt;
  }

  // コメントWS接続
  function connectCommentWs() {
    ws = new WebSocket(`ws://${location.host}/ws/comments`);

    ws.onopen = () => {
      addLog(`コメント接続完了（Bidirectional gRPC）as ${myUserName}`, 'info');
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      appendComment(data);
    };

    ws.onerror = () => addLog('コメントWS エラー', 'error');
    ws.onclose = () => addLog('コメントWS 切断', 'error');
  }

  // コメント送信
  function sendComment() {
    const input = document.getElementById('commentInput');
    const symbol = document.getElementById('symbolSelect').value;
    const text = input.value.trim();
    if (!ws || ws.readyState !== WebSocket.OPEN || !text) return;

    ws.send(JSON.stringify({ userName: myUserName, symbol, text }));
    input.value = '';
  }

  // コメント表示
  function appendComment(data) {
    const panel = document.getElementById('commentList');
    const div = document.createElement('div');
    div.className = 'comment-item';
    div.style.background = data.userName === myUserName ? '#1e3a5f' : '#1e293b';
    div.innerHTML = `
        <span class="comment-time">[${data.sentAt}]</span>
        <span class="comment-user">${data.userName}</span>
        <span class="comment-symbol">(${data.symbol || '全体'})</span>:
        <span class="comment-text">${escapeHtml(data.text)}</span>
    `;
    panel.prepend(div);
    // 最大50件
    while (panel.children.length > 50) panel.removeChild(panel.lastChild);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('btnStart').addEventListener('click', () => {
    if (eventSource) eventSource.close();

    addLog('gRPC Server Streaming 接続開始...', 'info');
    eventSource = new EventSource('/api/stocks/stream');

    eventSource.onopen = () => {
      statusBadge.textContent = '● LIVE';
      statusBadge.className   = 'badge badge-live';
      addLog('接続しました。株価データを受信中...', 'info');
      connectCommentWs();  // コメント接続も開始
    };

    eventSource.onmessage = (e) => {
      const data = JSON.parse(e.data);
      updateCard(data);
    };

    eventSource.onerror = () => {
      statusBadge.textContent = '● STOPPED';
      statusBadge.className   = 'badge badge-stopped';
      addLog('接続が切断されました。', 'error');
      eventSource.close();
    };
  });

  document.getElementById('btnStop').addEventListener('click', () => {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }
    if (ws) { ws.close(); ws = null; }  // コメント接続も停止
    statusBadge.textContent = '● STOPPED';
    statusBadge.className   = 'badge badge-stopped';
    addLog('配信を停止しました。');
  });

  // コメント送信ボタン
  document.getElementById('commentSend').addEventListener('click', sendComment);

  // Enterキーで送信
  document.getElementById('commentInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendComment();
    }
  });
</script>
</body>
</html>

syntax = "proto3";

option csharp_namespace = "GrpcStock";

package stock;

// 株価配信リクエスト
message StockRequest {
  repeated string symbols = 1;  // 監視する銘柄コード例: ["AAPL", "GOOGL", "MSFT"]
}

// 株価データ
message StockPrice {
  string symbol     = 1;  // 銘柄コード
  double price      = 2;  // 現在値
  double change     = 3;  // 前回比変動額
  double change_pct = 4;  // 前回比変動率(%)
  string updated_at = 5;  // 更新日時
}

// 追加：Unary 用リクエスト
message GetPriceRequest {
  string symbol = 1;  // 銘柄コード（例: "AAPL"）
}

// 株価配信サービス
service StockService {
  // 既存：Server Streaming
  rpc StreamPrices (StockRequest) returns (stream StockPrice);

  // 追加：Unary RPC（stream キーワードが付かない）
  rpc GetPrice (GetPriceRequest) returns (StockPrice);
}
